spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
    show-sql: false
  data:
    redis:
      host: ${SPRING_REDIS_HOST:redis}
      port: ${SPRING_REDIS_PORT:6379}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_SECRET}
            scope:
              - profile
              - email

openai:
  api-key: ${OPENAI_API_KEY}
  url: ${OPENAI_URL}
  model: gpt-4o-mini

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${TOKEN_EXP}

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false
